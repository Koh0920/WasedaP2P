# ato capsule manifest for WasedaP2P
#
# Run with:
#     ato run . -y --sandbox
#
# Required ato CLI: 0.4.112 or later (the `python -m <module>` invocation
# and the second-run `uv venv --clear` behaviour land in that release).
#
# Prerequisites NOT shipped with this capsule.toml — the consumer must
# provide them on the host before `ato run`:
#
#   1. PostgreSQL 14+ reachable at the URL given by DATABASE_URL.
#      The upstream backend uses `ALTER TABLE ... ADD COLUMN IF NOT EXISTS`
#      in db_init.py::ensure_schema_updates(), which is PostgreSQL-only
#      syntax — SQLite will reject it. Until the upstream relaxes that,
#      a real PostgreSQL is required.
#
#          createdb wasedap2p
#          export DATABASE_URL="postgresql+psycopg://$USER@localhost:5432/wasedap2p"
#
#   2. backend/requirements.txt — ato source/python provisioning needs
#      either `uv.lock` or `requirements.txt` to install dependencies.
#      The upstream repo currently ships neither.  A minimal set:
#
#          fastapi==0.115.6
#          uvicorn==0.32.1
#          sqlalchemy==2.0.36
#          psycopg[binary]==3.2.3
#          python-dotenv==1.0.1
#          passlib[argon2]==1.7.4
#          argon2-cffi==23.1.0
#          pyjwt==2.10.1
#          python-multipart==0.0.20
#
#   3. SECRET_KEY env (any 32-byte hex string).  Optionally SMTP_*
#      variables for the password-reset / email-verification flow.
#
#          export SECRET_KEY=$(openssl rand -hex 32)

schema_version = "0.3"
name           = "wasedap2p-backend"
version        = "0.1.0"
type           = "app"
default_target = "app"

[metadata]
display_name = "WasedaP2P (backend)"
description  = "Waseda peer-to-peer notes & folders sharing app — FastAPI backend"
author       = "itsukison"
tags         = ["fastapi", "postgres", "waseda", "p2p"]

# The frontend (React + Vite) is intentionally out of scope here:
# it can be served via `cd frontend && npm install && npm run dev`
# or wrapped in a separate capsule once the static-build pipeline is
# stable.  Keeping this manifest focused on the backend keeps the
# `ato run` flow tractable.

[targets.app]
runtime         = "source"
driver          = "python"
runtime_version = "3.11.10"
working_dir     = "backend"
# The upstream main.py defines the FastAPI `app` ASGI object but has no
# `if __name__ == "__main__":` block, so we launch via `python -m
# uvicorn`.  ato 0.4.112+ preserves the `-m` token end-to-end (see
# `is_python_module_flag` in
# crates/ato-cli/src/adapters/runtime/executors/source.rs).
run  = "python -m uvicorn main:app --host 127.0.0.1 --port 8000"
port = 8000

required_env = ["SECRET_KEY", "DATABASE_URL"]

[targets.app.env]
ALGORITHM    = "HS256"
FRONTEND_URL = "http://localhost:5173"

[isolation]
# Pass these through from the consumer's host env so secrets are not
# baked into the manifest.
allow_env = [
  "SECRET_KEY",
  "ALGORITHM",
  "DATABASE_URL",
  "FRONTEND_URL",
  "SMTP_HOST",
  "SMTP_PORT",
  "SMTP_USERNAME",
  "SMTP_PASSWORD",
  "SMTP_FROM_EMAIL",
  "SMTP_USE_TLS",
  "SMTP_USE_SSL",
]

[network]
# uvicorn binds 127.0.0.1; the consumer can SMTP-send password-reset
# mail through the host's smtp.gmail.com (or whatever SMTP_HOST is).
egress_allow = ["smtp.gmail.com"]
