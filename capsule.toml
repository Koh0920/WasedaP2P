# ato capsule manifest for WasedaP2P
#
# Run with:
#     export SECRET_KEY=$(openssl rand -hex 32)
#     ato run . -y --sandbox
#
# Required ato CLI: 0.4.112 or later (the `python -m <module>` invocation
# and the second-run `uv venv --clear` behaviour land in that release).
#
# Env split (per ato best practice):
#   - SECRET_KEY is the only per-user secret → declared as required_env
#     and passed through from the host.
#   - Everything else is app config → set directly in [targets.app.env]
#     below.  Override per deployment by editing this file or by exporting
#     the same name on the host (host env wins because the keys are also
#     in [isolation].allow_env).
#
# Prerequisites NOT shipped with this capsule.toml:
#
#   1. PostgreSQL 14+ reachable at DATABASE_URL.  Upstream's
#      db_init.py::ensure_schema_updates() uses
#      `ALTER TABLE ... ADD COLUMN IF NOT EXISTS` which SQLite rejects.
#
#          createdb wasedap2p
#          # default DATABASE_URL below assumes localhost / current user
#
#   2. backend/requirements.txt — ato source/python provisioning needs
#      either uv.lock or requirements.txt.  Minimal pin set we tested:
#
#          fastapi==0.115.6
#          uvicorn==0.32.1
#          sqlalchemy==2.0.36
#          psycopg[binary]==3.2.3
#          python-dotenv==1.0.1
#          passlib[argon2]==1.7.4
#          argon2-cffi==23.1.0
#          pyjwt==2.10.1
#          python-multipart==0.0.20

schema_version = "0.3"
name           = "wasedap2p-backend"
version        = "0.1.0"
type           = "app"
default_target = "app"

[metadata]
display_name = "WasedaP2P (backend)"
description  = "Waseda peer-to-peer notes & folders sharing app — FastAPI backend"
author       = "itsukison"
tags         = ["fastapi", "postgres", "waseda", "p2p"]

# The frontend (React + Vite) is intentionally out of scope here:
# `cd frontend && npm install && npm run dev` keeps it simple, and a
# separate capsule once the static-build pipeline is stable.

[targets.app]
runtime         = "source"
driver          = "python"
runtime_version = "3.11.10"
working_dir     = "backend"
# main.py is an ASGI module without an `if __name__` block, so launch
# via `python -m uvicorn`.  ato 0.4.112+ preserves the `-m` token
# end-to-end (see `is_python_module_flag` in
# crates/ato-cli/src/adapters/runtime/executors/source.rs).
run  = "python -m uvicorn main:app --host 127.0.0.1 --port 8000"
port = 8000

# Only SECRET_KEY is a per-user secret.  Everything else is config and
# lives in [targets.app.env] below.
required_env = ["SECRET_KEY"]

[targets.app.env]
ALGORITHM       = "HS256"
DATABASE_URL    = "postgresql+psycopg://postgres@localhost:5432/wasedap2p"
FRONTEND_URL    = "http://localhost:5173"
SMTP_HOST       = "smtp.gmail.com"
SMTP_PORT       = "587"
SMTP_USERNAME   = ""
SMTP_PASSWORD   = ""
SMTP_FROM_EMAIL = ""
SMTP_USE_TLS    = "true"
SMTP_USE_SSL    = "false"

[isolation]
# Pass SECRET_KEY through from the host (the only true secret).  The
# other names are listed so a host-side `export DATABASE_URL=…` can
# override the TOML default without editing this file.
allow_env = [
  "SECRET_KEY",
  "ALGORITHM",
  "DATABASE_URL",
  "FRONTEND_URL",
  "SMTP_HOST",
  "SMTP_PORT",
  "SMTP_USERNAME",
  "SMTP_PASSWORD",
  "SMTP_FROM_EMAIL",
  "SMTP_USE_TLS",
  "SMTP_USE_SSL",
]

[network]
# uvicorn binds 127.0.0.1; outbound only for SMTP.
egress_allow = ["smtp.gmail.com"]
